services:
  - type: web
    runtime: docker
    name: traffic-flow-backend
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: .
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: FRONTEND_DIR
        value: /app/Frontend
      - key: CACHE_NAMESPACE
        value: model-v2
      - key: ML_URL
        fromService:
          type: web
          name: traffic-flow-prediction-service
          property: host

  - type: web
    runtime: docker
    name: traffic-flow-prediction-service
    dockerfilePath: ./prediction-service/Dockerfile
    dockerContext: ./prediction-service
    plan: free
    autoDeploy: true
    healthCheckPath: /health
